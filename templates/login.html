<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <main class="auth-shell">
        <section class="auth-card">
            <p class="eyebrow">Welcome to</p>
            <h1 class="auth-title">Fish Monitoring System</h1>
            <p class="auth-copy">
                Sign in with the admin account to access the fish prediction dashboard.
            </p>

            <form class="predict-form" action="{{ url_for('login') }}" method="post">
                <div class="field">
                    <label for="email">Email</label>
                    <input id="email" type="email" name="email" placeholder="sample@sample.sp" required>
                </div>

                <div class="field">
                    <label for="password">Password</label>
                    <input id="password" type="password" name="password" placeholder="password" required>
                </div>

                <button type="submit">Login</button>
            </form>

            {% if error_message %}
            <div class="result error-box result-visible">
                {{ error_message }}
            </div>
            {% endif %}
        </section>
    </main>
</body>
</html>
